<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Slime Mold v3</title>
    <style>
      body {
        margin: 0;
        display: flex;
        background: #05060a;
        color: #fff;
        font-family: sans-serif;
      }
      #left {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      canvas {
        background: #000;
        border: 2px solid #0ff;
      }
      #right {
        width: 300px;
        background: #0a0f1a;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div id="left">
      <h2>🧬 Slime Mold v3</h2>
      <canvas id="c"></canvas>
    </div>

    <div id="right">
      <h3>Stats</h3>
      <div id="stats"></div>
      <h3>Selected</h3>
      <div id="brain"></div>
    </div>

    <script>
      const c = document.getElementById("c");
      const ctx = c.getContext("2d");

      let slimes = [],
        foods = [],
        selected = null;

      // FULLSCREEN
      function resize() {
        c.width = window.innerWidth - 300;
        c.height = window.innerHeight;
      }
      window.onresize = resize;
      resize();

      // PHEROMONE FIELD
      let gridSize = 6;
      let cols = Math.floor(c.width / gridSize);
      let rows = Math.floor(c.height / gridSize);
      let field = new Float32Array(cols * rows);

      // UTIL
      function idx(x, y) {
        return Math.floor(x / gridSize) + Math.floor(y / gridSize) * cols;
      }
      function randomColor() {
        return `hsl(${Math.random() * 360},80%,60%)`;
      }

      // PARTICLE
      class Particle {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.vx = 0;
          this.vy = 0;
        }
      }

      // SLIME
      class Slime {
        constructor(x, y, color = null, genes = null) {
          this.color = color || randomColor();

          this.genes = genes || {
            speed: 1.5,
            sensorDistance: 20,
            sensorAngle: 0.5,
            trailStrength: 2,
            trailDecay: 0.01,
            noise: 0.3,
            branchRate: 0.02,
            elasticity: 0.2,
            drag: 0.9,
          };

          this.particles = [];
          for (let i = 0; i < 20; i++) {
            let a = Math.random() * Math.PI * 2;
            this.particles.push(
              new Particle(x + Math.cos(a) * 10, y + Math.sin(a) * 10),
            );
          }

          this.food = 0;
        }

        sense(x, y, angle) {
          let sx = x + Math.cos(angle) * this.genes.sensorDistance;
          let sy = y + Math.sin(angle) * this.genes.sensorDistance;
          if (sx < 0 || sy < 0 || sx >= c.width || sy >= c.height) return 0;
          return field[idx(sx, sy)] || 0;
        }

        update() {
          let head = this.particles[0];

          // SENSOR DIRECTIONS
          let forward = this.sense(
            head.x,
            head.y,
            Math.atan2(head.vy, head.vx),
          );
          let left = this.sense(
            head.x,
            head.y,
            Math.atan2(head.vy, head.vx) - this.genes.sensorAngle,
          );
          let right = this.sense(
            head.x,
            head.y,
            Math.atan2(head.vy, head.vx) + this.genes.sensorAngle,
          );

          // TURN BASED ON GRADIENT
          if (left > forward && left > right) {
            head.vx += Math.cos(Math.atan2(head.vy, head.vx) - 0.3);
            head.vy += Math.sin(Math.atan2(head.vy, head.vx) - 0.3);
          } else if (right > forward && right > left) {
            head.vx += Math.cos(Math.atan2(head.vy, head.vx) + 0.3);
            head.vy += Math.sin(Math.atan2(head.vy, head.vx) + 0.3);
          }

          // RANDOM EXPLORATION
          head.vx += (Math.random() - 0.5) * this.genes.noise;
          head.vy += (Math.random() - 0.5) * this.genes.noise;

          // APPLY SPEED
          let len = Math.hypot(head.vx, head.vy) || 1;
          head.vx = (head.vx / len) * this.genes.speed;
          head.vy = (head.vy / len) * this.genes.speed;

          // MOVE PARTICLES (SOFT BODY)
          this.particles.forEach((p, i) => {
            if (i > 0) {
              let prev = this.particles[i - 1];
              let dx = prev.x - p.x,
                dy = prev.y - p.y;
              p.vx += dx * this.genes.elasticity;
              p.vy += dy * this.genes.elasticity;
            }

            p.x += p.vx;
            p.y += p.vy;

            p.vx *= this.genes.drag;
            p.vy *= this.genes.drag;

            // WALLS
            if (p.x < 0 || p.x > c.width) p.vx *= -1;
            if (p.y < 0 || p.y > c.height) p.vy *= -1;
          });

          // BRANCHING
          if (Math.random() < this.genes.branchRate) {
            let p =
              this.particles[Math.floor(Math.random() * this.particles.length)];
            this.particles.push(new Particle(p.x, p.y));
          }

          // DEPOSIT PHEROMONE
          let i = idx(head.x, head.y);
          field[i] += this.genes.trailStrength;

          // EAT FOOD
          foods.forEach((f, fi) => {
            if (Math.hypot(f.x - head.x, f.y - head.y) < 6) {
              this.food++;
              field[i] += 50; // strong signal when food found
              foods.splice(fi, 1);
            }
          });
        }

        draw() {
          ctx.fillStyle = this.color;
          ctx.beginPath();
          this.particles.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          });
          ctx.closePath();
          ctx.fill();
        }
      }

      // SPAWN
      function spawnSlime() {
        slimes.push(new Slime(c.width / 2, c.height / 2));
      }

      // FOOD SPAWN (50ms)
      setInterval(() => {
        foods.push({ x: Math.random() * c.width, y: Math.random() * c.height });
      }, 50);

      // LOOP
      function loop() {
        // FADE FIELD
        for (let i = 0; i < field.length; i++) {
          field[i] *= 0.99;
        }

        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(0, 0, c.width, c.height);

        // FOOD
        foods.forEach((f) => {
          ctx.fillStyle = "yellow";
          ctx.beginPath();
          ctx.arc(f.x, f.y, 3, 0, Math.PI * 2);
          ctx.fill();
        });

        // SLIMES
        slimes.forEach((s) => {
          s.update();
          s.draw();
        });

        document.getElementById("stats").innerText = `Slimes: ${slimes.length}`;

        requestAnimationFrame(loop);
      }

      spawnSlime();
      loop();
    </script>
  </body>
</html>
